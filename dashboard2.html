<!DOCTYPE html>
<html>
<head>

<title>SheSkills Dashboard</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>SheSkills</h1>

<nav>
<a href="skills.html">View Skills</a>
</nav>

</header>


<section class="form-section">

<h2>Post Your Skill</h2>

<form id="skillForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="text" id="skill" placeholder="Skill Name" required>

<select id="category">

<option>Technology</option>
<option>Cooking</option>
<option>Fashion</option>
<option>Handicrafts</option>
<option>Business</option>

</select>

<input type="text" id="qualification" placeholder="Qualification" required>

<textarea id="experience" placeholder="Experience" required></textarea>

<input type="text" id="location" placeholder="Location">

<button type="submit">Submit Skill</button>

</form>

</section>


<script>

document.getElementById("skillForm").addEventListener("submit",function(e){

e.preventDefault()

let name=document.getElementById("name").value
let skill=document.getElementById("skill").value
let category=document.getElementById("category").value
let qualification=document.getElementById("qualification").value
let experience=document.getElementById("experience").value
let location=document.getElementById("location").value

let newSkill={
name:name,
skill:skill,
category:category,
qualification:qualification,
experience:experience,
location:location
}

let skills=JSON.parse(localStorage.getItem("skills")) || []

skills.push(newSkill)

localStorage.setItem("skills",JSON.stringify(skills))

window.location.href="skills.html"

})

</script>

</body>
</html>
